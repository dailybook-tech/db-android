    implementation project(':boilerplate:network')
    implementation project(':boilerplate:navigator')
    implementation project(':feature:auth')
    implementation project(':feature:base')
    implementation project(':feature:keep')
    implementation libs.play.services.ads
    implementation project(':boilerplate:uikit')
    implementation project(':boilerplate:analytics')
    implementation libs.androidx.core.ktx
    implementation libs.androidx.appcompat
    implementation libs.material
    implementation libs.androidx.activity
    implementation libs.androidx.constraintlayout
    implementation libs.koin
    implementation libs.splashscreen
    implementation(libs.retrofit.gson)
    implementation(libs.flow.call.adapter)
    implementation libs.androidx.datastore
    implementation libs.androidx.datastore.preferences.core
    implementation libs.androidx.datastore.preferences.rxjava3
    implementation libs.firebase.common.ktx
    implementation libs.firebase.crashlytics.ktx
    implementation libs.firebase.perf
    implementation platform(libs.firebase.bom)
    implementation libs.firebase.messaging
    implementation libs.firebase.analytics
    implementation(libs.google.firebase.analytics)
    implementation(libs.mixpanel)
    implementation project(':feature:expense')
    implementation project(':feature:income')
    implementation libs.androidx.profileinstaller
    implementation libs.facebook.android.sdk
    implementation libs.install.referrer
    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    androidTestImplementation libs.androidx.espresso.core
    androidTestImplementation libs.androidx.uiautomator
    androidTestImplementation libs.androidx.benchmark.macro.junit4
    baselineProfile project(':app:baselineprofile')
